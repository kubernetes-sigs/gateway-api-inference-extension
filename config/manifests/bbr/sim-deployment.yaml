apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deepseek-v3.2
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: vllm-deepseek-v3.2
  template:
    metadata:
      labels:
        app: vllm-deepseek-v3.2
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.6.1
        imagePullPolicy: Always
        args:
        - --model
        - deepseek-ai/DeepSeek-V3.2
        - --port
        - "8000"
        - --max-loras
        - "2"
        - --lora-modules
        - '{"name": "ski-resorts"}'
        - '{"name": "movie-critique"}'
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepseek-adapters-allowlist
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
data:
  baseModel: deepseek-ai/DeepSeek-V3.2
  adapters: |
    - ski-resorts
    - movie-critique
