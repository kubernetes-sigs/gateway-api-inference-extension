bbr:
  name: body-based-router
  replicas: 1
  image:
    name: bbr
    hub: registry.k8s.io/gateway-api-inference-extension
    tag: v1.4.0-rc.1
    pullPolicy: Always
  port: 9004
  healthCheckPort: 9005
  multiNamespace: false

  flags:
    # Log verbosity
    v: 3

  # Plugin configuration (transitional - currently runs no-op default plugin)
  plugins:
    - type: default-bbr
      name: default-bbr
      json: {"v":0, "no-op":true}

provider:
  name: none

inferenceGateway:
  name: inference-gateway
