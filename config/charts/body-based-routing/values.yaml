bbr:
  name: body-based-router
  replicas: 1
  image:
    name: bbr
    hub: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension
    tag: main
    pullPolicy: Always
  port: 9004
  healthCheckPort: 9005
  multiNamespace: false

  flags:
    # Log verbosity
    v: 3

  tracing:
    enabled: true
    # Sets Custom service name for traces if left empty it will default to `gateway-api-inference-extension/bbr`
    otelServiceName: ""
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"

provider:
  name: none

inferenceGateway:
  name: inference-gateway
