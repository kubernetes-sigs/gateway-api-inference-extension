# Example values.yaml for PD-SLO Architecture
# This configuration enables separate predictors for prefill and decode pods
# Required for llm-d-inference-scheduler with PD disaggregation

inferenceExtension:
  latencyPredictor:
    enabled: true

    # Enable PD Mode for disaggregated scheduling
    pdMode:
      enabled: true  # Set to true to enable PD-SLO architecture

      predictors:
        # Prefill predictor: Predicts TTFT for prefill pods
        # Training data comes from prefill pod metrics
        prefill:
          trainingServer:
            port: 8000
            image:
              hub: your-docker-repo  # Update with your Docker registry
              name: latencypredictor-training-server
              tag: latest
              pullPolicy: Always
            resources:
              requests:
                cpu: "2000m"
                memory: "4Gi"
              limits:
                cpu: "4000m"
                memory: "8Gi"
            volumeSize: "20Gi"
            config:
              LATENCY_RETRAINING_INTERVAL_SEC: "1"
              LATENCY_MIN_SAMPLES_FOR_RETRAIN: "100"
              LATENCY_TTFT_MODEL_PATH: "/models/ttft.joblib"
              LATENCY_TPOT_MODEL_PATH: "/models/tpot.joblib"
              LATENCY_TTFT_SCALER_PATH: "/models/ttft_scaler.joblib"
              LATENCY_TPOT_SCALER_PATH: "/models/tpot_scaler.joblib"
              LATENCY_MODEL_TYPE: "xgboost"
              LATENCY_MAX_TRAINING_DATA_SIZE_PER_BUCKET: "5000"
              LATENCY_QUANTILE_ALPHA: "0.9"

          predictionServers:
            count: 1  # Number of prefill prediction server replicas
            startPort: 8001
            image:
              hub: your-docker-repo  # Update with your Docker registry
              name: latencypredictor-prediction-server
              tag: latest
              pullPolicy: Always
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
            volumeSize: "10Gi"
            config:
              LATENCY_MODEL_TYPE: "xgboost"
              PREDICT_HOST: "0.0.0.0"
              LOCAL_TTFT_MODEL_PATH: "/server_models/ttft.joblib"
              LOCAL_TPOT_MODEL_PATH: "/server_models/tpot.joblib"
              LOCAL_TTFT_SCALER_PATH: "/server_models/ttft_scaler.joblib"
              LOCAL_TPOT_SCALER_PATH: "/server_models/tpot_scaler.joblib"

        # Decode predictor: Predicts TTFT + TPOT for decode pods
        # Training data comes from decode pod metrics
        decode:
          trainingServer:
            port: 8010  # Different port from prefill
            image:
              hub: your-docker-repo  # Update with your Docker registry
              name: latencypredictor-training-server
              tag: latest
              pullPolicy: Always
            resources:
              requests:
                cpu: "2000m"
                memory: "4Gi"
              limits:
                cpu: "4000m"
                memory: "8Gi"
            volumeSize: "20Gi"
            config:
              LATENCY_RETRAINING_INTERVAL_SEC: "1"
              LATENCY_MIN_SAMPLES_FOR_RETRAIN: "100"
              LATENCY_TTFT_MODEL_PATH: "/models/ttft.joblib"
              LATENCY_TPOT_MODEL_PATH: "/models/tpot.joblib"
              LATENCY_TTFT_SCALER_PATH: "/models/ttft_scaler.joblib"
              LATENCY_TPOT_SCALER_PATH: "/models/tpot_scaler.joblib"
              LATENCY_MODEL_TYPE: "xgboost"
              LATENCY_MAX_TRAINING_DATA_SIZE_PER_BUCKET: "5000"
              LATENCY_QUANTILE_ALPHA: "0.9"

          predictionServers:
            count: 1  # Number of decode prediction server replicas
            startPort: 8011
            image:
              hub: your-docker-repo  # Update with your Docker registry
              name: latencypredictor-prediction-server
              tag: latest
              pullPolicy: Always
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
            volumeSize: "10Gi"
            config:
              LATENCY_MODEL_TYPE: "xgboost"
              PREDICT_HOST: "0.0.0.0"
              LOCAL_TTFT_MODEL_PATH: "/server_models/ttft.joblib"
              LOCAL_TPOT_MODEL_PATH: "/server_models/tpot.joblib"
              LOCAL_TTFT_SCALER_PATH: "/server_models/ttft_scaler.joblib"
              LOCAL_TPOT_SCALER_PATH: "/server_models/tpot_scaler.joblib"

# This will generate the following environment variables in the EPP container:
#
# - PREFILL_TRAINING_URL=http://localhost:8000
# - PREFILL_PREDICTION_URL=http://localhost:8001
# - DECODE_TRAINING_URL=http://localhost:8010
# - DECODE_PREDICTION_URL=http://localhost:8011
#
# Total sidecar containers in EPP pod:
# - 1 prefill training server (port 8000)
# - 1 prefill prediction server (port 8001)
# - 1 decode training server (port 8010)
# - 1 decode prediction server (port 8011)
# = 4 total sidecar containers
#
# These environment variables are consumed by llm-d-inference-scheduler's
# PDPredictorSet (pkg/predictors/pd_predictors.go)
