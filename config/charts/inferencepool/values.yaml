inferenceExtension:
  replicas: 1
  image:
    name: epp
    hub: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension
    tag: main
    pullPolicy: Always
  extProcPort: 9002
  env: []
  enablePprof: true # Enable pprof handlers for profiling and debugging
  modelServerMetricsPath: "/metrics"
  modelServerMetricsScheme: "http"
  modelServerMetricsHttpsInsecureSkipVerify: true
  # This is the plugins configuration file. 
  pluginsConfigFile: "default-plugins.yaml"
  # pluginsCustomConfig:
  #   custom-plugins.yaml: |
  #     apiVersion: inference.networking.x-k8s.io/v1alpha1
  #     kind: EndpointPickerConfig
  #     plugins:
  #     - type: custom-scorer
  #       parameters:
  #         custom-threshold: 64
  #     schedulingProfiles:
  #     - name: default
  #       plugins:
  #       - pluginRef: custom-scorer

  # Example environment variables:
  # env:
  #   ENABLE_EXPERIMENTAL_FEATURE: "true"

  # Define additional container ports
  extraContainerPorts: []
  # Define additional service ports
  extraServicePorts: []
  # Enable leader election for high availability. When enabled, it is recommended to set replicas > 1.
  # Only the leader pod will be ready to serve traffic.
  enableLeaderElection: false

inferencePool:
  targetPorts:
    - number: 8000
  modelServerType: vllm # vllm, triton-tensorrt-llm
  modelServers: # REQUIRED
    matchLabels:
      app: vllm-llama3-8b-instruct

# Options: ["gke", "istio", "none"]
provider:
  name: none

gke:
  monitoringSecret:
    name: inference-gateway-sa-metrics-reader-secret
    namespace: default

istio:
  destinationRule:
    enabled: true
    # Provide a way to override the default calculated host
    host: "" 
    # Optional: Apply a mesh-wide traffic policy
    trafficPolicy: {}
    # Optional: Define subsets for versioned routing (e.g., by labels)
    subsets: []
    # Optional: Control which namespaces can access this DestinationRule
    exportTo: []
    # Optional: Apply only to specific workloads (via selector labels)
    workloadSelector: {}

